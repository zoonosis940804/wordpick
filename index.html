<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>주제별 단어 뽑기</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Jua&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="floating-shape shape-a" aria-hidden="true"></div>
    <div class="floating-shape shape-b" aria-hidden="true"></div>
    <div class="floating-shape shape-c" aria-hidden="true"></div>

    <main class="app-shell">
      <header class="hero-card">
        <h1>주제별 단어 뽑기</h1>
        <p class="subtitle">
          주제를 입력하고 원하는 개수를 고르면, 그 주제에 맞는 단어가 뽑혀요.
          여러 주제를 뽑아도 지워지지 않고 옆으로 넘겨서 볼 수 있어요.
        </p>
      </header>

      <section class="control-card" aria-labelledby="controlTitle">
        <h2 id="controlTitle">단어 뽑기 설정</h2>

        <form id="drawForm" class="draw-form">
          <label for="topicInput">주제</label>
          <input
            id="topicInput"
            name="topic"
            type="text"
            placeholder="예: 동물, 우주, 음식"
            maxlength="24"
            autocomplete="off"
            required
          />

          <label for="countInput">단어 개수</label>
          <input
            id="countInput"
            name="count"
            type="number"
            min="1"
            max="20"
            value="6"
            required
          />

          <label class="option-toggle" for="numberModeInput">
            <input id="numberModeInput" name="numberMode" type="checkbox" />
            <span>번호를 붙여서 세로로 보기</span>
          </label>

          <div class="action-row">
            <button type="submit" class="btn btn-primary">단어 뽑기</button>
            <button type="button" class="btn btn-soft" id="clearAllBtn">전체 지우기</button>
          </div>
        </form>

        <div class="quick-topics" aria-label="빠른 주제 선택">
          <button type="button" class="topic-chip" data-topic="동물">동물</button>
          <button type="button" class="topic-chip" data-topic="과일">과일</button>
          <button type="button" class="topic-chip" data-topic="공룡">공룡</button>
          <button type="button" class="topic-chip" data-topic="우주">우주</button>
          <button type="button" class="topic-chip" data-topic="직업">직업</button>
          <button type="button" class="topic-chip" data-topic="운동">운동</button>
        </div>

        <p id="statusText" class="status-text" aria-live="polite">
          첫 주제를 입력하고 단어를 뽑아보세요.
        </p>
      </section>

      <section class="results-card" aria-labelledby="resultTitle">
        <div class="result-title-row">
          <h2 id="resultTitle">주제 보드</h2>
          <span id="historyCount" class="history-count">0개 주제</span>
        </div>

        <p id="swipeHint" class="swipe-hint" hidden>
          카드가 많아지면 아래로 스크롤해서 이어서 볼 수 있어요.
        </p>

        <div id="resultsViewport" class="results-viewport" aria-label="주제 결과 카드 목록">
          <div id="resultsTrack" class="results-track"></div>
          <article id="emptyState" class="empty-state">
            <h3>아직 뽑은 주제가 없어요</h3>
            <p>첫 단어 뽑기를 시작하면 카드가 여기에 차곡차곡 쌓여요.</p>
          </article>
        </div>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
